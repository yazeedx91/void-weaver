# 🚀 ShaheenPulse AI - Industrial Docker Configuration
# 2026-Grade Industrial Launch Environment

version: '3.8'

services:
  # 🧠 shaheen-brain: Node.js/Fastify Backend with Aeon™ Evolution Core
  shaheen-brain:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: shaheen-brain
    restart: unless-stopped
    ports:
      - "3000:3000"  # Fastify API
      - "9229:9229"  # Debug port
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://shaheen:password@shaheen-telemetry:5432/shaheenpulse
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-shaheenpulse-industrial-secret}
      - AEON_EVOLUTION_ENABLED=true
      - PHALANX_TWIN_GATING=true
      - VITALITY_INDEX_ENABLED=true
      - PATENT_PROTECTION_ENABLED=true
      - INDUSTRIAL_MODE=true
      - PERFORMANCE_MONITORING=true
    volumes:
      - ./backend:/app
      - /app/node_modules
      - shaheen_logs:/app/logs
      - shaheen_data:/app/data
    networks:
      - shaheen-network
    depends_on:
      - shaheen-telemetry
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/vitality-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # 🎨 shaheen-pulse-ui: Next.js Frontend with Vortex™ Interactions
  shaheen-pulse-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: shaheen-pulse-ui
    restart: unless-stopped
    ports:
      - "3001:3000"  # Next.js app
      - "3002:3002"  # HMR port
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://shaheen-brain:3000
      - NEXT_PUBLIC_VORTEX_ENABLED=true
      - NEXT_PUBLIC_VITALITY_INDEX=true
      - NEXT_PUBLIC_INDUSTRIAL_MODE=true
      - NEXT_PUBLIC_PATENT_PROTECTION=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - shaheen-network
    depends_on:
      - shaheen-brain
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # 🗄️ shaheen-telemetry: PostgreSQL for Vitality Index™ Data
  shaheen-telemetry:
    image: postgres:15-alpine
    container_name: shaheen-telemetry
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=shaheenpulse
      - POSTGRES_USER=shaheen
      - POSTGRES_PASSWORD=password
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - shaheen_db_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - shaheen_backups:/backups
    networks:
      - shaheen-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shaheen -d shaheenpulse"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200

  # 🚀 Redis for Caching & Session Management
  redis:
    image: redis:7-alpine
    container_name: shaheen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - shaheen_redis_data:/data
    networks:
      - shaheen-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 📊 InfluxDB for Time-Series Telemetry (Alternative to PostgreSQL)
  influxdb:
    image: influxdb:2.7-alpine
    container_name: shaheen-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=shaheen
      - DOCKER_INFLUXDB_INIT_PASSWORD=password123
      - DOCKER_INFLUXDB_INIT_ORG=shaheenpulse
      - DOCKER_INFLUXDB_INIT_BUCKET=vitality_index
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=shaheenpulse-industrial-token
    volumes:
      - shaheen_influx_data:/var/lib/influxdb2
      - shaheen_influx_config:/etc/influxdb2
    networks:
      - shaheen-network
    profiles:
      - timeseries

  # 🔍 Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: shaheen-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - shaheen_prometheus_data:/prometheus
    networks:
      - shaheen-network
    profiles:
      - monitoring

  # 📈 Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: shaheen-grafana
    restart: unless-stopped
    ports:
      - "3003:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - shaheen_grafana_data:/var/lib/grafana
      - ./monitoring/grafana:/etc/grafana/provisioning
    networks:
      - shaheen-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

# 🌐 Network Configuration
networks:
  shaheen-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 💾 Volume Configuration
volumes:
  shaheen_db_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  shaheen_influx_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/influxdb
  shaheen_influx_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./config/influxdb
  shaheen_redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  shaheen_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./logs
  shaheen_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/application
  shaheen_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./backups
  shaheen_prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/prometheus
  shaheen_grafana_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/grafana
